$kind: http-request
url: "{{current_api_url}}/teacher/attendance-by-month"
method: POST
headers:
  Accept: application/json
body:
  type: formdata
  content:
    - type: text
      key: month
      value: "4"
    - type: text
      key: year
      value: "2026"
auth:
  type: bearer
  credentials:
    token: "{{teacher_token}}"
order: 2000
